<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact Me</Menu></title>
    <link rel="stylesheet" href="CSS/contact-me-page.css"/>
</head>
<body>
    <header>
        <h3><b>CONTACT ME</b></h3>
    </header>
<main>
    <form action="/action.php">
    Enter your name: <input type="text" id="01" placeholder="Full Name"><br/><br/>
    Enter username : <input type="text" id="02" placeholder="username"><br/><br/>
    Enter password : <input type="password" id="03" placeholder="password"><br/><br/>
    Select State   : <select name="Select state" id="01">
                    <option value="select">Select</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Sikkim">Sikkim</option>
    </select><br/><br/>
    Select profile type: <label for="101">
        <input type="radio" value="Individual" name="profile" id="101">Individual
    </label>
    <label for="102">
        <input type="radio" value="Professional" name="profile" id="102">Professional 
    </label><br/><br/>
    Select your fav topic: <label for="201"><input type="checkbox" value="Software" name="topic" id="201">Software</label>
                        <label for="202"><input type="checkbox" value="Hardware" name="profile" id="202">Hardware</label>
                        <br/> <br/>
    <textarea name="Feedback" placeholder="Enter your feedback here" row="15" cols="35"></textarea>
    <br/> <br/>
    <input type="submit" value="submit">
                    
    </form>
</main>
    
</body>
</html>
